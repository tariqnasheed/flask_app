<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Flask App</title>
    <style>
        * { box-sizing: border-box; margin:0; padding:0; font-family: Arial, sans-serif; }
        body { background: #f4f7fc; height:100vh; display:flex; align-items:center; justify-content:center; }
        .container { background:#fff; padding:36px; border-radius:10px; width:380px; box-shadow:0 6px 18px rgba(0,0,0,0.08); }
        h2 { text-align:center; margin-bottom:18px; color:#333 }
        .input-group { margin-bottom:14px }
        label { display:block; margin-bottom:6px; color:#555 }
        input { width:100%; padding:10px; border:1px solid #ccc; border-radius:6px }
        .btn { width:100%; padding:12px; background:#007BFF; color:#fff; border:none; border-radius:6px; cursor:pointer }
        .error { color:#b00020; text-align:center; margin-bottom:12px }
        .footer { text-align:center; margin-top:12px; color:#666 }
    </style>
</head>
<body>
    <div class="container">
        <h2>Create Account</h2>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/register">
            <div class="input-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" placeholder="Your full name" required>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Choose a password" required>
            </div>

            <button class="btn" type="submit">Register</button>
        </form>

        <div class="footer">
            Already have an account? <a href="/login">Login</a>
        </div>
    </div>
</body>
</html>
